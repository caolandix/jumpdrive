name: C/C++ CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Install Boost
      run: sudo apt-get update && sudo apt-get install -y libboost-all-dev
    - uses: actions/checkout@v4
    - name: Configure and Build
      run: |
        cmake -B ${{github.workspace}}
        cmake --build ${{github.workspace}}
    - name:  Commit and Push
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        mkdir -p bin/
        cp ${{github.workspace}}/*.a bin/ || cp ${{github.workspace}}/*.so bin/ || cp ${{github.workspace}}/Release/*.lib bin/
        git add bin/
        git commit -m "Automated build: update library binaries"
        git push
      
