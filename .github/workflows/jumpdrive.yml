name: C/C++ CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest
    steps:
    - name: Install Boost
      run: sudo apt-get update && sudo apt-get install -y libboost-all-dev
    - uses: actions/checkout@v4
    - name: Configure CMake
      run: cmake -B ${{github.workspace}}
    - name: Build
      run: cmake --build ${{github.workspace}}
